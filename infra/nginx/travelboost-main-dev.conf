server {
    listen 443 ssl;
    server_name reverb.dev.travelboost.co.id;

    ssl_certificate /etc/letsencrypt/live/dev.travelboost.co.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.travelboost.co.id/fullchain.pem;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:8080;
    }
}

server {
    listen 443 ssl;
    server_name reverb.travelboost.co.id;

    ssl_certificate /etc/ssl/cloudflare/travelboost/origin.crt;
    ssl_certificate_key /etc/ssl/cloudflare/travelboost/origin.key;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_pass http://127.0.0.1:8081;
    }
}

server {
    listen 443 ssl;
    server_name dev.travelboost.co.id *.dev.travelboost.co.id;

    root /home/travelboost/travelboost-dev/public;
    index index.php index.html;

    ssl_certificate /etc/letsencrypt/live/dev.travelboost.co.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.travelboost.co.id/fullchain.pem;

    access_log /var/log/nginx/travelboost-dev-access.log;
    error_log /var/log/nginx/travelboost-dev-error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_busy_buffers_size 64k;
        fastcgi_temp_file_write_size 64k;
    }

    location ~ /\. {
        deny all;
    }
}

include /etc/nginx/sites-available/dev-user-domains/*.conf;

