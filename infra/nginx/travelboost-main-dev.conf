# Custom domain handling for DEV. In order for testing, we MUST user subdomain from *.herz.my.id
# This is because potential conflict for main and dev custom domain handling

server {
    listen 443 ssl;
    server_name *.herz.my.id;

    root /home/travelboost/travelboost-dev/public;
    index index.php index.html;

    # TODO: fix this
    ssl_certificate /etc/ssl/cloudflare/travelboost/origin.crt;
    ssl_certificate_key /etc/ssl/cloudflare/travelboost/origin.key;

    access_log /var/log/nginx/dev-access.log;
    error_log /var/log/nginx/dev-error.log;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

        location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        # Laravel PHP-FPM buffer
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_busy_buffers_size 64k;
        fastcgi_temp_file_write_size 64k;
    }

    location ~ /\. {
        deny all;
    }
}

# Custom domain handling for MAIN
server {
    listen 443 ssl default_server;
    server_name _;

    root /home/travelboost/travelboost-main/public;
    index index.php index.html;

    ssl_certificate /etc/ssl/cloudflare/travelboost/origin.crt;
    ssl_certificate_key /etc/ssl/cloudflare/travelboost/origin.key;

    access_log /var/log/nginx/main-access.log;
    error_log /var/log/nginx/main-error.log;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

        location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        # Laravel PHP-FPM buffer
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_busy_buffers_size 64k;
        fastcgi_temp_file_write_size 64k;
    }

    location ~ /\. {
        deny all;
    }
}

# Used for custom domain acknowledgement. must be skippable if use Cloudflare for SaaS service
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}